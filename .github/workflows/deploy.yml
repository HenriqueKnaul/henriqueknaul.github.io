name: Deploy para GitHub Pages

on:
  push:
    branches: [main] # dispara quando alguém faz merge de um PR na main
  workflow_dispatch:   # permite rodar manualmente pelo GitHub

# Permissões que o Actions precisa para poder escrever no GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Vai evitar que rode dois deploys ao mesmo tempo.
concurrency:
  group: pages
  cancel-in-progress: false

#pega o código, instala tudo e gera o site. 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

# só vai rodar depois que o build terminou com sucesso.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4